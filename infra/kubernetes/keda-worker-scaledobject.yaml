apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-kafka-lag
  namespace: task-platform
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 3
  maxReplicaCount: 50
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: worker-group
        topic: platform.tasks
        lagThreshold: "1000"
        offsetResetPolicy: earliest